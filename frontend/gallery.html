<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Blog</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .gallery-item {
            aspect-ratio: 16/9;
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-light);
        }
        
        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-medium);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .gallery-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--secondary-color);
            background: linear-gradient(135deg, var(--surface-color), var(--background-color));
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-light">
                <a href="index.html" class="navbar-brand">Blog</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="gallery.html">Gallery</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Title -->
            <div class="text-center mb-5">
                <h1>Gallery</h1>
                <p class="text-muted">Visual stories and moments</p>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be dynamically inserted here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">🖼️</div>
                <div class="empty-state-text">No images available</div>
                <div class="empty-state-subtext">Gallery images will appear here</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="text-muted mb-0">&copy; 2024 Blog. Minimal design with care.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Gallery Script -->
    <script>
        /**
         * Gallery Page JavaScript
         * Simple gallery with placeholder images
         */
        
        document.addEventListener('DOMContentLoaded', function() {
            loadGallery();
        });

        function loadGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');
            
            // Create placeholder gallery items
            const galleryItems = [
                { title: 'Sunset', emoji: '🌅' },
                { title: 'Mountains', emoji: '🏔️' },
                { title: 'Ocean', emoji: '🌊' },
                { title: 'Forest', emoji: '🌲' },
                { title: 'City', emoji: '🏙️' },
                { title: 'Desert', emoji: '🏜️' },
                { title: 'Lake', emoji: '🏞️' },
                { title: 'Stars', emoji: '⭐' },
                { title: 'Flowers', emoji: '🌸' }
            ];

            if (galleryItems.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            galleryGrid.innerHTML = '';
            
            galleryItems.forEach((item, index) => {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';
                galleryItem.innerHTML = `
                    <div class="gallery-placeholder">
                        <div>
                            <div style="font-size: 4rem; margin-bottom: 0.5rem;">${item.emoji}</div>
                            <div style="font-size: 1rem; font-weight: 500;">${item.title}</div>
                        </div>
                    </div>
                `;
                
                galleryItem.addEventListener('click', () => {
                    alert(`Gallery item: ${item.title}\n\nThis is a placeholder gallery. In a real application, this would open a modal or navigate to a detailed view.`);
                });
                
                galleryGrid.appendChild(galleryItem);
            });
        }
    </script>
</body>
</html>
