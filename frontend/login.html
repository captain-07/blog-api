<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deb Blogs — Sign In</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Site Header -->

    <header class="site-header">

        <div class="container">

            <a href="index.html" class="logo">Deb Blogs</a>

            <nav>

                <ul class="nav-links">

                    <li><a href="index.html">Home</a></li>

                    <li><a href="gallery.html">Gallery</a></li>

                </ul>

            </nav>

        </div>

    </header>



    <!-- Main Content -->

    <main class="container">

        <div class="auth-form-container">

            <div class="text-center mb-4">

                <h2 class="accent-text" style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h2>

                <p class="text-muted">Sign in to your account</p>

            </div>



            <form id="loginForm">

                <div class="form-group">

                    <label for="username">Username</label>

                    <input type="text" id="username" class="form-control" required>

                </div>

                <div class="form-group">

                    <label for="password">Password</label>

                    <input type="password" id="password" class="form-control" required>

                </div>

                <div id="loginError" style="color: #e74c3c; font-size: 0.85rem; margin-bottom: 1.5rem; display: none;">

                    Invalid credentials. Please try again.

                </div>

                <button type="submit" class="btn" style="width: 100%;">Sign In</button>

            </form>



            <div class="text-center" style="margin-top: 2rem;">

                <p class="text-muted" style="font-size: 0.9rem;">

                    Don't have an account? <a href="#" class="accent-text">Contact Admin</a>

                </p>

            </div>

        </div>

    </main>



    <!-- Footer -->

    <footer class="site-footer">

        <div class="container">

            <p class="copyright">&copy; 2026 Deb Blogs. Crafted with elegance.</p>

        </div>

    </footer>



    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script>

        document.getElementById('loginForm').addEventListener('submit', async (e) => {

            e.preventDefault();

            const username = document.getElementById('username').value;

            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('loginError');



            try {

                const response = await window.BlogAPI.login(username, password);

                if (response.access) {

                    localStorage.setItem('access_token', response.access);

                    localStorage.setItem('refresh_token', response.refresh);

                    window.location.href = 'index.html';

                }

            } catch (error) {

                console.error('Login error:', error);

                errorDiv.style.display = 'block';

            }

        });

    </script>

</body>

</html>
