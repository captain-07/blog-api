<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail - Blog</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-light">
                <a href="index.html" class="navbar-brand">Blog</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="backButton">Back</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div class="loading-spinner"></div>
                <p>Loading post...</p>
            </div>

            <!-- Error State (Hidden by default) -->
            <div class="empty-state" id="errorState" style="display: none;">
                <div class="empty-state-icon">😕</div>
                <div class="empty-state-text">Post not found</div>
                <div class="empty-state-subtext">The post you're looking for doesn't exist or has been removed</div>
                <a href="index.html" class="btn btn-outline-secondary mt-3">Back to Home</a>
            </div>

            <!-- Post Detail (Populated by JavaScript) -->
            <article class="post-detail" id="postDetail" style="display: none;">
                <!-- Post title and meta will be inserted here -->
            </article>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="text-muted mb-0">&copy; 2024 Blog. Minimal design with care.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- API Module -->
    <script src="js/api.js"></script>
    
    <!-- Post Detail Script -->
    <script src="js/post.js"></script>
</body>
</html>
