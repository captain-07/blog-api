<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Deb Blogs — Author</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Site Header -->

    <header class="site-header">

        <div class="container">

            <a href="index.html" class="logo">Deb Blogs</a>

            <nav>

                <ul class="nav-links">

                    <li><a href="index.html">Home</a></li>

                    <li><a href="gallery.html">Gallery</a></li>

                    <li id="authNav">

                        <!-- Populated by JS -->

                    </li>

                </ul>

            </nav>

        </div>

    </header>



    <!-- Main Content -->

    <main>

        <!-- Loading State -->

        <div class="loader" id="loadingState">

            <div class="spinner"></div>

        </div>



        <!-- Error State -->

        <div class="container" id="errorState" style="display: none; text-align: center; padding: 6rem 0;">

            <h2 class="accent-text">Author not found</h2>

            <p class="text-muted mb-4">We couldn't find the profile you're looking for.</p>

            <a href="index.html" class="btn btn-outline">Return Home</a>

        </div>



        <!-- Author Section -->

        <section id="authorSection" style="display: none;">

            <div class="hero">

                <div class="container">

                    <div id="authorAvatar" class="accent-text" style="font-size: 5rem; margin-bottom: 1rem;">👤</div>

                    <h1 id="authorName">Author Name</h1>

                    <p class="hero-sub" id="authorBio">Contributing writer and enthusiast.</p>

                </div>

            </div>



            <div class="container">

                <div style="border-top: 1px solid var(--border); padding: 4rem 0;">

                    <h2 class="text-center mb-4">Articles <span class="accent-text">by this author</span></h2>

                    

                    <div id="postsLoadingState" class="loader" style="display: none;">

                        <div class="spinner"></div>

                    </div>



                    <div id="postsEmptyState" style="display: none; text-align: center;">

                        <p class="text-muted">No articles published yet.</p>

                    </div>



                    <div class="post-grid" id="postsList">

                        <!-- Posts will be dynamically inserted here -->

                    </div>



                    <!-- Pagination -->

                    <div class="text-center" style="margin-top: 4rem; display: none;" id="pagination">

                        <button class="btn btn-outline" id="prevButton" disabled>Previous</button>

                        <span id="pageInfo" style="margin: 0 1.5rem; font-size: 0.9rem; font-weight: 600;">Page 1 of 1</span>

                        <button class="btn btn-outline" id="nextButton" disabled>Next</button>

                    </div>

                </div>

            </div>

        </section>

    </main>



    <!-- Footer -->

    <footer class="site-footer">

        <div class="container">

            <div class="footer-logo">Deb Blogs</div>

            <p class="copyright">&copy; 2026 Deb Blogs. Crafted with elegance.</p>

        </div>

    </footer>



    <!-- Scripts -->

    <script src="js/api.js"></script>

    <script src="js/author.js"></script>

    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const authNav = document.getElementById('authNav');

            const token = localStorage.getItem('access_token');

            if (token) {

                authNav.innerHTML = `<a href="#" onclick="localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); location.reload();">Logout</a>`;

            } else {

                authNav.innerHTML = `<a href="login.html">Login</a>`;

            }

        });

    </script>

</body>

</html>
